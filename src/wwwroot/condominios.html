<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Consulta de Condomínios</title>
  <style>
    :root {
      --verde-escuro: #00522f;
      --verde: #007a43;
      --verde-medio: #00995d;
      --verde-claro: #8dc63f;
      --verde-suave: #edf7f1;
      --amarelo: #f9b233;
      --laranja: #f58220;
      --branco: #ffffff;
      --container-fundo: #eef4ef;
      --cinza-fundo: #004d2e;
      --titulo-pagina: #ffffff;
      --texto-pagina: #d9e5dd;
      --destaque-pagina: #8dc63f;
      --cinza-borda: #d9e5dd;
      --cinza-texto: #26352f;
      --cinza-muted: #6d7f75;
      --erro: #b00020;
      --sucesso: #007a43;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: var(--cinza-fundo);
      color: var(--cinza-texto);
      transition: background 0.2s ease;
    }

    body.modo-claro {
      --cinza-fundo: #ffffff;
      --container-fundo: #ffffff;
      --titulo-pagina: var(--verde-escuro);
      --texto-pagina: var(--cinza-muted);
      --destaque-pagina: var(--verde);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--titulo-pagina);
    }

    p {
      color: var(--texto-pagina);
      margin: 0;
    }

    strong {
      color: var(--destaque-pagina);
    }

    .topo-pagina {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    .switch-tema {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--texto-pagina);
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      margin-top: 4px;
    }

    .switch-tema input {
      display: none;
    }

    .switch-trilho {
      width: 48px;
      height: 26px;
      background: #b8c5be;
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .switch-trilho::before {
      content: "";
      width: 20px;
      height: 20px;
      background: var(--branco);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: transform 0.2s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .switch-tema input:checked + .switch-trilho {
      background: var(--verde);
    }

    .switch-tema input:checked + .switch-trilho::before {
      transform: translateX(21px);
    }

    .card {
      background: var(--container-fundo);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--cinza-borda);
      border-top: 4px solid var(--verde);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.22);
    }

    .card h2 {
      color: var(--verde-escuro);
      margin-top: 0;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
      color: var(--verde-escuro);
    }

    input, select, button {
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid var(--cinza-borda);
      border-radius: 6px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      background: var(--branco);
      color: var(--cinza-texto);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--verde-medio);
      box-shadow: 0 0 0 3px rgba(0, 153, 93, 0.15);
    }

    button {
      cursor: pointer;
      background: var(--verde);
      color: white;
      border: none;
      margin-right: 8px;
      font-weight: bold;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: var(--verde-escuro);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      background: #b8c5be;
      cursor: not-allowed;
      color: #f4f4f4;
    }

    .linha {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 16px;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .erro {
      color: var(--erro);
    }

    .sucesso {
      color: var(--sucesso);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--cinza-borda);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--cinza-borda);
      text-align: left;
      font-size: 14px;
    }

    th {
      background: var(--verde-escuro);
      color: white;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .paginacao {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .info-pagina {
      font-weight: bold;
      margin-left: 8px;
      color: var(--verde-escuro);
    }

    input:disabled {
      background: #f0f4f2;
      color: var(--cinza-muted);
      cursor: not-allowed;
    }

    .linha-resumo {
      cursor: pointer;
    }

    .linha-resumo:hover {
      background: var(--verde-suave);
    }

    .botao-expandir {
      width: 32px;
      height: 32px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      background: var(--amarelo);
      color: var(--verde-escuro);
      font-size: 14px;
      line-height: 32px;
      text-align: center;
      font-weight: bold;
    }

    .botao-expandir:hover {
      background: var(--laranja);
      color: white;
    }

    .detalhes-condominio {
      display: none;
      background: var(--verde-suave);
    }

    .detalhes-condominio.aberto {
      display: table-row;
    }

    .detalhes-conteudo {
      padding: 18px;
      border-left: 4px solid var(--amarelo);
      background: linear-gradient(90deg, rgba(237, 247, 241, 0.95), #ffffff);
    }

    .detalhes-conteudo h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: var(--verde-escuro);
    }

    .detalhes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .detalhe-item {
      background: white;
      border: 1px solid var(--cinza-borda);
      border-radius: 8px;
      padding: 10px;
      border-left: 3px solid var(--verde-claro);
    }

    .detalhe-label {
      display: block;
      font-size: 12px;
      color: var(--verde);
      margin-bottom: 4px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .detalhe-valor {
      font-size: 14px;
      color: var(--cinza-texto);
      word-break: break-word;
    }

    pre {
      background: var(--verde-escuro);
      color: #f4fff9;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      border-left: 4px solid var(--amarelo);
    }

    @media (max-width: 900px) {
      .linha {
        grid-template-columns: 1fr;
      }

      .detalhes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topo-pagina">
    <div>
      <h1>Consulta de Condomínios</h1>
      <p>teste endpoint <strong>/api/condominios</strong>.</p>
    </div>

    <label class="switch-tema" for="modoEscuro">
      <span>Modo escuro</span>
      <input id="modoEscuro" type="checkbox" checked />
      <span class="switch-trilho"></span>
    </label>
  </div>

  <div class="card">
    <div class="linha">
      <div>
        <label for="tipoBusca">Tipo de busca</label>
        <select id="tipoBusca">
          <option value="todos">Sem filtros</option>
          <option value="id">ID</option>
          <option value="codigo">Código do condomínio</option>
          <option value="cnpj">CNPJ</option>
          <option value="nome">Nome</option>
        </select>
      </div>

      <div>
        <label for="valorBusca">Valor da busca</label>
        <input id="valorBusca" type="text" placeholder="" disabled />
      </div>
    </div>

    <label for="token">Token JWT Bearer</label>
    <input id="token" type="text" placeholder="Token JWT" />

    <button onclick="buscar(1)">Pesquisar</button>
    <button onclick="limpar()">Limpar</button>

    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Resultado</h2>

    <div id="resultadoTabela"></div>

    <div class="paginacao" id="paginacao" style="display: none;">
      <button onclick="paginaAnterior()">Anterior</button>
      <div id="botoesPaginas"></div>
      <button onclick="proximaPagina()">Próxima</button>
      <span id="infoPagina" class="info-pagina"></span>
    </div>
  </div>

  <div class="card">
    <h2>JSON</h2>
    <pre id="json">Nenhuma consulta realizada.</pre>
  </div>

  <script>
    let paginaAtual = 1;
    let totalPaginas = 1;

    const apiBase = "/api/condominios";

    document.getElementById("modoEscuro").addEventListener("change", alternarModoEscuro);

    function alternarModoEscuro() {
      const modoEscuroAtivo = document.getElementById("modoEscuro").checked;
      document.body.classList.toggle("modo-claro", !modoEscuroAtivo);
    }

    alternarModoEscuro();

        const placeholdersBusca = {
      todos: "",
      id: "Digite o ID do condomínio",
      codigo: "Digite o código do condomínio. Ex: 1 ou 0001",
      cnpj: "Digite o CNPJ com ou sem máscara",
      nome: "Digite o nome do condomínio"
    };

    document.getElementById("tipoBusca").addEventListener("change", atualizarCampoBusca);

    document.getElementById("valorBusca").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        buscar(1);
      }
    });

    function atualizarCampoBusca() {
      const tipoBusca = document.getElementById("tipoBusca").value;
      const valorBusca = document.getElementById("valorBusca");

      valorBusca.placeholder = placeholdersBusca[tipoBusca] ?? "Digite o valor da busca";

      if (tipoBusca === "todos") {
        valorBusca.value = "";
        valorBusca.disabled = true;
        return;
      }

      valorBusca.disabled = false;
      valorBusca.focus();
    }

    function montarHeaders() {
      const token = document.getElementById("token").value.trim();

      const headers = {
        "Accept": "application/json"
      };

      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      return headers;
    }

        function montarUrl(pagina) {
      const tipoBusca = document.getElementById("tipoBusca").value;
      const valorBusca = document.getElementById("valorBusca").value.trim();

      if (tipoBusca === "id") {
        if (!valorBusca) {
          throw new Error("Informe o ID para pesquisar.");
        }

        return `${apiBase}/${encodeURIComponent(valorBusca)}`;
      }

      const params = new URLSearchParams();

      if (tipoBusca === "codigo") {
        if (!valorBusca) {
          throw new Error("Informe o código do condomínio.");
        }

        params.append("CodigoDoCondominio", valorBusca);
      }

      if (tipoBusca === "cnpj") {
        if (!valorBusca) {
          throw new Error("Informe o CNPJ.");
        }

        params.append("CNPJDoCondominio", valorBusca);
      }

      if (tipoBusca === "nome") {
        if (!valorBusca) {
          throw new Error("Informe o nome do condomínio.");
        }

        params.append("NomeDoCondominio", valorBusca);
      }

      params.append("Pagina", pagina);

      return `${apiBase}?${params.toString()}`;
    }

    async function buscar(pagina) {
      const status = document.getElementById("status");
      const json = document.getElementById("json");
      const resultadoTabela = document.getElementById("resultadoTabela");

      try {
        status.textContent = "Consultando...";
        status.className = "status";

        const url = montarUrl(pagina);

        const response = await fetch(url, {
          method: "GET",
          headers: montarHeaders()
        });

        const texto = await response.text();

        let data;
        try {
          data = texto ? JSON.parse(texto) : null;
        } catch {
          data = texto;
        }

        json.textContent = JSON.stringify(data, null, 2);

        if (!response.ok) {
          resultadoTabela.innerHTML = "";
          esconderPaginacao();

          status.textContent = `Erro ${response.status}`;
          status.className = "status erro";
          return;
        }

        status.textContent = `Consulta realizada com sucesso. Status ${response.status}`;
        status.className = "status sucesso";

        renderizarResultado(data, pagina);
      } catch (error) {
        resultadoTabela.innerHTML = "";
        esconderPaginacao();

        status.textContent = error.message;
        status.className = "status erro";
        json.textContent = error.message;
      }
    }

    function renderizarResultado(data, pagina) {
      const tipoBusca = document.getElementById("tipoBusca").value;

      if (tipoBusca === "id") {
        renderizarTabela([data]);
        esconderPaginacao();
        return;
      }

      paginaAtual = data.pagina ?? pagina;
      totalPaginas = data.totalPaginas ?? 1;

      renderizarTabela(data.itens ?? []);
      renderizarPaginacao();
    }

        function renderizarTabela(itens) {
      const container = document.getElementById("resultadoTabela");

      if (!itens || itens.length === 0) {
        container.innerHTML = "<p>Nenhum condomínio encontrado.</p>";
        return;
      }

      const linhas = itens.map((item, index) => {
        const detalheId = `detalhes-condominio-${index}`;

        return `
          <tr class="linha-resumo" onclick="alternarDetalhes('${detalheId}', this)">
            <td>
              <button class="botao-expandir" type="button" title="Ver detalhes">▶</button>
            </td>
            <td>${valor(item.codigoDoCondominio)}</td>
            <td>${valor(item.cnpjDoCondominio)}</td>
            <td>${valor(item.nomeDoCondominio)}</td>
            <td>${valor(item.cidadeDoEndereco)}</td>
            <td>${valor(item.estadoDoEndereco)}</td>
            <td>${valor(item.status)}</td>
            <td>${valor(item.numeroDeTorres)}</td>
            <td>${valor(item.numeroDeUnidades)}</td>
          </tr>

          <tr id="${detalheId}" class="detalhes-condominio">
            <td colspan="9">
              <div class="detalhes-conteudo">
                <h3>${valor(item.nomeDoCondominio)}</h3>

                <div class="detalhes-grid">
                  <div class="detalhe-item">
                    <span class="detalhe-label">Código</span>
                    <span class="detalhe-valor">${valor(item.codigoDoCondominio)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">CNPJ</span>
                    <span class="detalhe-valor">${valor(item.cnpjDoCondominio)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Status</span>
                    <span class="detalhe-valor">${valor(item.status)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Endereço</span>
                    <span class="detalhe-valor">${valor(item.endereco)}, ${valor(item.numeroDoEndereco)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Bairro</span>
                    <span class="detalhe-valor">${valor(item.bairroDoEndereco)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Cidade / Estado</span>
                    <span class="detalhe-valor">${valor(item.cidadeDoEndereco)} / ${valor(item.estadoDoEndereco)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">CEP</span>
                    <span class="detalhe-valor">${valor(item.cepDoEndereco)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Número de torres</span>
                    <span class="detalhe-valor">${valor(item.numeroDeTorres)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Número de unidades</span>
                    <span class="detalhe-valor">${valor(item.numeroDeUnidades)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Início da administração</span>
                    <span class="detalhe-valor">${valor(item.dataInicial_Administracao)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Fim da administração</span>
                    <span class="detalhe-valor">${valor(item.dataFinal_Administracao, "Não informado")}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Gerente de contas</span>
                    <span class="detalhe-valor">${valor(item.nomeGerenteDeContas)}</span>
                  </div>

                  <div class="detalhe-item">
                    <span class="detalhe-label">Síndico</span>
                    <span class="detalhe-valor">${valor(item.nomeSindico)}</span>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Código</th>
              <th>CNPJ</th>
              <th>Nome</th>
              <th>Cidade</th>
              <th>Estado</th>
              <th>Status</th>
              <th>Torres</th>
              <th>Unidades</th>
            </tr>
          </thead>
          <tbody>
            ${linhas}
          </tbody>
        </table>
      `;
    }

        function alternarDetalhes(id, linhaResumo) {
      const linhaDetalhes = document.getElementById(id);
      const botao = linhaResumo.querySelector(".botao-expandir");

      if (!linhaDetalhes || !botao) {
        return;
      }

      const estaAberto = linhaDetalhes.classList.toggle("aberto");
      botao.textContent = estaAberto ? "▼" : "▶";
    }

    function valor(valorRecebido, textoVazio = "-") {
      if (valorRecebido === null || valorRecebido === undefined || valorRecebido === "") {
        return textoVazio;
      }

      return escaparHtml(String(valorRecebido));
    }

    function escaparHtml(texto) {
      return texto
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderizarPaginacao() {
      const paginacao = document.getElementById("paginacao");
      const botoesPaginas = document.getElementById("botoesPaginas");
      const infoPagina = document.getElementById("infoPagina");

      paginacao.style.display = "flex";

      botoesPaginas.innerHTML = "";

      for (let i = 1; i <= totalPaginas; i++) {
        const botao = document.createElement("button");
        botao.textContent = i;
        botao.disabled = i === paginaAtual;
        botao.onclick = () => buscar(i);
        botoesPaginas.appendChild(botao);
      }

      infoPagina.textContent = `Página ${paginaAtual} de ${totalPaginas}`;
    }

    function esconderPaginacao() {
      document.getElementById("paginacao").style.display = "none";
    }

    function paginaAnterior() {
      if (paginaAtual > 1) {
        buscar(paginaAtual - 1);
      }
    }

    function proximaPagina() {
      if (paginaAtual < totalPaginas) {
        buscar(paginaAtual + 1);
      }
    }

    function limpar() {
      document.getElementById("tipoBusca").value = "todos";
      document.getElementById("valorBusca").value = "";
      document.getElementById("status").textContent = "";
      document.getElementById("resultadoTabela").innerHTML = "";
      document.getElementById("json").textContent = "Nenhuma consulta realizada.";
      esconderPaginacao();

      paginaAtual = 1;
      totalPaginas = 1;

      atualizarCampoBusca();
    }
  </script>
</body>
</html>
